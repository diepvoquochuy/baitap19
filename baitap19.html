<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập 19 - Memory Card Flip Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #fff;
        }

        .info {
            color: white;
            font-size: 20px;
            margin-bottom: 15px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 120px);
            gap: 15px;
            justify-content: center;
            margin: 20px auto;
        }

        .card {
            width: 120px;
            height: 150px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flip .card-inner {
            transform: rotateY(180deg);
        }

        .front,
        .back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .front {
            background: #2c3e50;
            color: white;
        }

        .back {
            background: white;
            transform: rotateY(180deg);
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #2c3e50;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1abc9c;
        }

        @media (max-width: 600px) {
            .game-board {
                grid-template-columns: repeat(2, 120px);
            }
        }
    </style>
</head>

<body>

    <h1>Memory Card Flip Game</h1>

    <div class="info">
        Số lượt click: <span id="moves">0</span>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <button onclick="resetGame()">Chơi lại</button>

    <script>
        const symbols = ["🍎", "🍎", "🍌", "🍌", "🍇", "🍇", "🍓", "🍓"];

        let firstCard = null;
        let secondCard = null;
        let lockBoard = false;
        let moves = 0;
        let matchedPairs = 0;

        const gameBoard = document.getElementById("gameBoard");
        const movesText = document.getElementById("moves");

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            gameBoard.innerHTML = "";
            moves = 0;
            matchedPairs = 0;
            movesText.textContent = moves;
            firstCard = null;
            secondCard = null;
            lockBoard = false;

            const shuffledCards = shuffle([...symbols]);

            shuffledCards.forEach(symbol => {
                const card = document.createElement("div");
                card.classList.add("card");
                card.dataset.symbol = symbol;

                card.innerHTML = `
          <div class="card-inner">
            <div class="front">?</div>
            <div class="back">${symbol}</div>
          </div>
        `;

                card.addEventListener("click", flipCard);
                gameBoard.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;
            if (this.classList.contains("flip")) return;

            this.classList.add("flip");
            moves++;
            movesText.textContent = moves;

            if (!firstCard) {
                firstCard = this;
                return;
            }

            secondCard = this;
            checkMatch();
        }

        function checkMatch() {
            if (firstCard.dataset.symbol === secondCard.dataset.symbol) {
                matchedPairs++;

                firstCard.removeEventListener("click", flipCard);
                secondCard.removeEventListener("click", flipCard);

                resetTurn();

                if (matchedPairs === 4) {
                    setTimeout(() => {
                        alert("Chúc mừng! Bạn đã thắng sau " + moves + " lượt click.");
                    }, 500);
                }
            } else {
                lockBoard = true;

                setTimeout(() => {
                    firstCard.classList.remove("flip");
                    secondCard.classList.remove("flip");
                    resetTurn();
                }, 900);
            }
        }

        function resetTurn() {
            firstCard = null;
            secondCard = null;
            lockBoard = false;
        }

        function resetGame() {
            createBoard();
        }

        createBoard();
    </script>

</body>

</html>
